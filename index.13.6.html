<!DOCTYPE html>
<html>
<head>
    <title>Trường Mầm Non Thanh Hiền</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <meta http-equiv="x-ua-compatible" content="IE=edge" />
    <style>
        html, body { height:100%; overflow:hidden; margin:0; padding:0; font-family:Arial, Helvetica, sans-serif; font-size:16px; background-color:#000000; }
        
        /* 1. Cấu hình mặc định cho Màn hình chờ (Áp dụng cho Máy tính / Màn hình lớn) */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('http://giaphahohoang.sunsky.info/wp-content/uploads/2026/05/16-05.png') no-repeat center center;
            /* Trên máy tính: giữ kích thước gọn gàng bao gồm chiều cao tự động fit */
            background-size: auto 80%; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; 
            transition: opacity 0.5s ease; 
        }

        /* Lớp phủ mờ nhẹ phía sau để tách biệt nền đen và ảnh nếu cần */
        #welcome-screen::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); 
            z-index: 1;
        }

        /* Tiêu đề trên màn hình chờ */
        #welcome-title {
            position: relative;
            z-index: 2;
            color: #FFFFFF;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
            padding: 0 20px;
            text-transform: uppercase;
        }

        /* 2. Cấu hình nút bấm xem tour */
        #start-button {
            position: relative;
            z-index: 2;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: bold;
            color: #FFFFFF;
            background-color: #FF5722; 
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
            transition: transform 0.2s, background-color 0.2s;
            letter-spacing: 0.5px;
        }

        #start-button:hover {
            background-color: #E64A19;
            transform: scale(1.05);
        }

        /* ========================================================
           3. CẤU HÌNH RIÊNG CHO ĐIỆN THOẠI VÀ THIẾT BỊ DI ĐỘNG (Responsive)
           ======================================================== */
        @media screen and (max-width: 768px) {
            #welcome-screen {
                /* Trên điện thoại: Cho phép ảnh dọc hiển thị to hơn, vừa vặn theo chiều dọc (hoặc dùng cover) */
                background-size: contain; 
            }
            
            #welcome-title {
                font-size: 22px; /* Thu nhỏ cỡ chữ một chút trên điện thoại để tránh bị vỡ dòng quá nhiều */
                margin-bottom: 20px;
                text-shadow: 2px 2px 6px rgba(0, 0, 0, 1);
            }

            #start-button {
                padding: 12px 30px;
                font-size: 15px; /* Điều chỉnh kích thước nút bấm vừa tay trên màn hình cảm ứng */
            }
        }
    </style>
</head>
<body>

<div id="welcome-screen">
    <button id="start-button" onclick="startTour()">KHÁM PHÁ TOUR 360°</button>
</div>

<script src="tour.js"></script>

<div id="pano" style="width:100%;height:100%;">
    <noscript><table style="width:100%;height:100%"><tr style="vertical-align:middle"><td><div style="text-align:center">ERROR:<br/><br/>Javascript not activated<br/><br/></div></td></tr></table></noscript>
    <script>
        function startTour() {
            var welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0'; 
            
            setTimeout(function() {
                welcome.style.display = 'none'; 
            }, 500); 

            embedpano({xml:"tour.xml", target:"pano", passQueryParameters:"startscene,startlookat"});
        }
    </script>
</div>

</body>
</html>
